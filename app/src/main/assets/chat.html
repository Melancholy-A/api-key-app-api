<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <script src="vendor/marked/marked.min.js"></script>
  <script src="vendor/dompurify/purify.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/katex/auto-render.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b6b6b;
      --line: #e7e7e7;
      --soft: #f4f4f4;
      --soft-2: #fafafa;
      --code: #171717;
      --code-text: #f7f7f7;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.58;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    #chat {
      min-height: 100vh;
      padding: 16px 12px 18px;
    }

    .empty {
      min-height: calc(100vh - 34px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 32px;
      font-size: 15px;
    }

    .msg {
      display: flex;
      width: 100%;
      margin: 14px 0 18px;
    }

    .msg.user { justify-content: flex-end; }
    .msg.assistant, .msg.system { justify-content: flex-start; }

    .bubble {
      max-width: min(100%, 760px);
      min-width: 0;
    }

    .user .bubble {
      max-width: min(84vw, 680px);
      background: var(--soft);
      border-radius: 22px;
      padding: 10px 14px;
    }

    .assistant .bubble {
      width: 100%;
      padding: 0 2px;
      background: transparent;
    }

    .system {
      justify-content: center;
      margin: 10px 0;
    }

    .system .bubble {
      max-width: 96%;
      color: var(--muted);
      background: var(--soft-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
    }

    .content > :first-child { margin-top: 0; }
    .content > :last-child { margin-bottom: 0; }
    .assistant .content { padding: 0 2px; }

    p { margin: 0 0 0.88em; }
    h1, h2, h3 { line-height: 1.25; margin: 1.1em 0 .45em; }
    h1 { font-size: 1.32rem; }
    h2 { font-size: 1.16rem; }
    h3 { font-size: 1.04rem; }
    ul, ol { padding-left: 1.35em; margin: .45em 0 .9em; }
    li { margin: .25em 0; }
    a { color: #0b57d0; text-decoration: none; }

    blockquote {
      margin: .7em 0;
      padding: .15em .85em;
      border-left: 3px solid var(--line);
      color: #555;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      display: block;
      overflow-x: auto;
      margin: .8em 0;
      font-size: 14px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 7px 9px;
      text-align: left;
    }

    th { background: var(--soft); }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: .55em 0;
      border: 1px solid var(--line);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
      background: var(--soft);
      border-radius: 6px;
      padding: .12em .35em;
    }

    pre {
      position: relative;
      overflow-x: auto;
      background: var(--code);
      color: var(--code-text);
      border-radius: 12px;
      padding: 14px;
      margin: .9em 0;
      line-height: 1.48;
      font-size: 13px;
    }

    pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: .25em 0;
    }

    details.reasoning {
      border: 1px solid var(--line);
      background: var(--soft-2);
      border-radius: 12px;
      padding: 8px 10px;
      margin: 0 0 12px;
      color: var(--muted);
    }

    details.reasoning summary {
      cursor: pointer;
      color: #4d4d4d;
      font-size: 13px;
      font-weight: 650;
      list-style-position: inside;
    }

    .reasoning-body {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }

    .sources {
      border: 1px solid var(--line);
      background: var(--soft-2);
      border-radius: 12px;
      margin-top: 12px;
      padding: 10px;
    }

    .sources-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 5px;
    }

    .source-list {
      margin: 0;
      padding-left: 1.25em;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .source-list li { margin: .38em 0; }
    .source-list a { color: #0b57d0; text-decoration: none; overflow-wrap: anywhere; }

    .source-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      min-height: 30px;
    }

    .user .actions { justify-content: flex-end; }
    .assistant .actions { justify-content: flex-start; padding-left: 0; }

    .action {
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .action:active { background: var(--soft); color: var(--text); }
    .action svg { width: 17px; height: 17px; stroke: currentColor; }

    .history-load {
      justify-content: center;
      margin: 8px 0 14px;
    }

    .history-load button {
      border: 1px solid var(--line);
      background: var(--soft-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 13px;
      font: inherit;
      font-size: 13px;
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 8px 2px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: .35;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    @keyframes pulse {
      0%, 100% { transform: translateY(0); opacity: .32; }
      50% { transform: translateY(-3px); opacity: .9; }
    }
  </style>
</head>
<body>
  <main id="chat">
    <div class="empty" id="empty">问点什么，或者上传图片/文件开始。</div>
  </main>

  <script>
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty');
    const messages = [];
    let thinkingNode = null;
    let historyLoader = null;
    let nextMessageIndex = 0;

    marked.setOptions({ gfm: true, breaks: true });

    function normalizeLatex(text) {
      return (text || '')
        .replace(/\\\\\[/g, '\\[')
        .replace(/\\\\\]/g, '\\]')
        .replace(/\\\\\(/g, '\\(')
        .replace(/\\\\\)/g, '\\)');
    }

    function safeMarkdown(text) {
      const raw = marked.parse(normalizeLatex(text));
      return DOMPurify.sanitize(raw, {
        ADD_TAGS: ['details', 'summary'],
        ADD_URI_SAFE_ATTR: ['src'],
        ALLOWED_URI_REGEXP: /^(?:(?:(?:f|ht)tps?|data|file):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i
      });
    }

    function renderMath(root) {
      try {
        renderMathInElement(root, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false,
          strict: false
        });
      } catch (error) {
        console.log(error);
      }
    }

    function icon(name) {
      const paths = {
        copy: '<path d="M8 8h10v10H8z"/><path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
        edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
        speak: '<path d="M11 5 6 9H3v6h3l5 4z"/><path d="M16 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/>',
        share: '<path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/>',
        refresh: '<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>'
      };
      return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + paths[name] + '</svg>';
    }

    function openUrl(url) {
      if (!url) return;
      if (window.AndroidBridge && AndroidBridge.openUrl) {
        AndroidBridge.openUrl(url);
        return;
      }
      window.open(url, '_blank');
    }

    function bindLinks(root) {
      root.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href') || '';
        if (!/^https?:\/\//i.test(href)) return;
        link.onclick = event => {
          event.preventDefault();
          openUrl(href);
        };
      });
    }

    function speakText(text) {
      if (window.AndroidBridge && AndroidBridge.speakText) {
        AndroidBridge.speakText(text || '');
      }
    }

    function shareText(text) {
      if (window.AndroidBridge && AndroidBridge.shareText) {
        AndroidBridge.shareText(text || '');
      }
    }

    function normalizeSources(sources) {
      return Array.isArray(sources)
        ? sources.filter(source => source && (source.title || source.snippet || source.url))
        : [];
    }

    function addSources(bubble, sources) {
      const items = normalizeSources(sources);
      if (!items.length) return;

      const box = document.createElement('aside');
      box.className = 'sources';

      const title = document.createElement('div');
      title.className = 'sources-title';
      title.textContent = '联网搜索来源';
      box.appendChild(title);

      const list = document.createElement('ol');
      list.className = 'source-list';
      items.forEach(source => {
        const item = document.createElement('li');
        const label = source.title || source.url || '未命名来源';
        if (source.url) {
          const link = document.createElement('a');
          link.href = source.url;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.textContent = label;
          link.onclick = event => {
            event.preventDefault();
            openUrl(source.url);
          };
          item.appendChild(link);
        } else {
          item.textContent = label;
        }
        const metaText = [source.publishedAt, source.snippet].filter(Boolean).join(' · ');
        if (metaText) {
          const meta = document.createElement('span');
          meta.className = 'source-meta';
          meta.textContent = metaText;
          item.appendChild(meta);
        }
        list.appendChild(item);
      });
      box.appendChild(list);
      bubble.appendChild(box);
    }

    function addAction(actions, title, iconName, handler) {
      const button = document.createElement('button');
      button.className = 'action';
      button.type = 'button';
      button.title = title;
      button.setAttribute('aria-label', title);
      button.innerHTML = icon(iconName);
      button.onclick = handler;
      actions.appendChild(button);
    }

    function renderMessage(role, text, reasoning, sources, messageIndex) {
      const row = document.createElement('section');
      row.className = 'msg ' + role;

      const bubble = document.createElement('article');
      bubble.className = 'bubble';

      if (reasoning && reasoning.trim()) {
        const details = document.createElement('details');
        details.className = 'reasoning';
        const summary = document.createElement('summary');
        summary.textContent = '思考过程';
        const body = document.createElement('div');
        body.className = 'reasoning-body';
        body.innerHTML = safeMarkdown(reasoning);
        details.appendChild(summary);
        details.appendChild(body);
        bubble.appendChild(details);
        renderMath(body);
        bindLinks(body);
      }

      const content = document.createElement('div');
      content.className = 'content';
      content.innerHTML = safeMarkdown(text || '');
      bubble.appendChild(content);
      renderMath(content);
      bindLinks(content);

      addSources(bubble, sources);

      if (role !== 'system') {
        const actions = document.createElement('div');
        actions.className = 'actions';
        if (role === 'user') {
          addAction(actions, '修改要求', 'edit', () => {
            if (window.AndroidBridge && AndroidBridge.reviseMessage) AndroidBridge.reviseMessage(messageIndex, text || '');
          });
        }
        addAction(actions, '复制', 'copy', () => copyText(text || ''));
        if (role === 'assistant') {
          addAction(actions, '朗读', 'speak', () => speakText(text || ''));
          addAction(actions, '分享', 'share', () => shareText(text || ''));
          addAction(actions, '重新生成', 'refresh', () => {
            if (window.AndroidBridge && AndroidBridge.regenerateLastResponse) AndroidBridge.regenerateLastResponse();
          });
        }
        bubble.appendChild(actions);
      }

      row.appendChild(bubble);
      return row;
    }

    function addMessage(role, text, reasoning, sources) {
      removeHistoryLoader();
      empty.style.display = 'none';
      const messageIndex = nextMessageIndex++;
      const row = renderMessage(role, text, reasoning, sources, messageIndex);
      chat.appendChild(row);
      messages.push({ role, text, reasoning, sources: normalizeSources(sources), index: messageIndex });
      scrollBottom();
    }

    function renderMessages(items, startIndex, remainingCount) {
      clearMessages(startIndex || 0);
      const list = Array.isArray(items) ? items : [];
      list.forEach((item, offset) => {
        const absoluteIndex = (startIndex || 0) + offset;
        const row = renderMessage(item.role || 'assistant', item.text || '', item.reasoning || '', item.sources || [], absoluteIndex);
        chat.appendChild(row);
        messages.push({
          role: item.role || 'assistant',
          text: item.text || '',
          reasoning: item.reasoning || '',
          sources: normalizeSources(item.sources || []),
          index: absoluteIndex
        });
        nextMessageIndex = Math.max(nextMessageIndex, absoluteIndex + 1);
      });
      addHistoryLoader(remainingCount || 0);
      scrollBottom();
    }

    function prependMessages(items, startIndex, remainingCount) {
      const list = Array.isArray(items) ? items : [];
      if (!list.length) {
        addHistoryLoader(remainingCount || 0);
        return;
      }
      empty.style.display = 'none';
      const oldHeight = document.body.scrollHeight;
      removeHistoryLoader();
      const anchor = Array.from(chat.children).find(node => node !== empty) || null;
      list.forEach((item, offset) => {
        const absoluteIndex = (startIndex || 0) + offset;
        const row = renderMessage(item.role || 'assistant', item.text || '', item.reasoning || '', item.sources || [], absoluteIndex);
        chat.insertBefore(row, anchor);
      });
      const normalized = list.map((item, offset) => ({
        role: item.role || 'assistant',
        text: item.text || '',
        reasoning: item.reasoning || '',
        sources: normalizeSources(item.sources || []),
        index: (startIndex || 0) + offset
      }));
      messages.unshift(...normalized);
      addHistoryLoader(remainingCount || 0);
      requestAnimationFrame(() => {
        const delta = document.body.scrollHeight - oldHeight;
        window.scrollBy(0, delta);
      });
    }

    function addHistoryLoader(remainingCount) {
      removeHistoryLoader();
      if (!remainingCount) return;
      historyLoader = document.createElement('section');
      historyLoader.className = 'msg system history-load';
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = '加载更早消息（还有 ' + remainingCount + ' 条）';
      button.onclick = () => {
        if (window.AndroidBridge && AndroidBridge.loadEarlierHistory) AndroidBridge.loadEarlierHistory();
      };
      historyLoader.appendChild(button);
      const anchor = Array.from(chat.children).find(node => node !== empty) || null;
      chat.insertBefore(historyLoader, anchor);
    }

    function removeHistoryLoader() {
      if (historyLoader) historyLoader.remove();
      historyLoader = null;
    }

    function setThinking(active) {
      if (!active) {
        if (thinkingNode) thinkingNode.remove();
        thinkingNode = null;
        return;
      }
      empty.style.display = 'none';
      if (thinkingNode) return;
      const row = document.createElement('section');
      row.className = 'msg assistant';
      const bubble = document.createElement('article');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      row.appendChild(bubble);
      chat.appendChild(row);
      thinkingNode = row;
      scrollBottom();
    }

    function clearMessages() {
      messages.length = 0;
      nextMessageIndex = arguments.length ? (Number(arguments[0]) || 0) : 0;
      chat.innerHTML = '';
      chat.appendChild(empty);
      empty.style.display = 'flex';
      thinkingNode = null;
      historyLoader = null;
    }

    function copyText(text) {
      if (window.AndroidBridge && AndroidBridge.copyText) {
        AndroidBridge.copyText(text);
        return;
      }
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
    }

    function scrollBottom() {
      requestAnimationFrame(() => window.scrollTo(0, document.body.scrollHeight));
    }

    window.ChatView = { addMessage, renderMessages, prependMessages, setThinking, clearMessages };
  </script>
</body>
</html>
