<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <script src="vendor/marked/marked.min.js"></script>
  <script src="vendor/dompurify/purify.min.js"></script>
  <script src="vendor/katex/katex.min.js"></script>
  <script src="vendor/katex/auto-render.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --text: #101315;
      --muted: #68717a;
      --line: #dde3ea;
      --soft: #eef1f4;
      --soft-2: #fbfcfd;
      --accent-soft: #e8f3ef;
      --code: #15181d;
      --code-text: #f7f9fb;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.58;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    #chat {
      min-height: 100vh;
      width: min(100%, 840px);
      margin: 0 auto;
      padding: 18px 14px 22px;
    }

    .empty {
      min-height: calc(100vh - 34px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 32px;
      font-size: 15px;
      line-height: 1.7;
    }

    .msg {
      display: flex;
      width: 100%;
      margin: 12px 0 18px;
      animation: rise .18s ease-out;
    }

    .msg.user { justify-content: flex-end; }
    .msg.assistant, .msg.system { justify-content: flex-start; }

    .bubble {
      max-width: min(100%, 760px);
      min-width: 0;
    }

    .user .bubble {
      max-width: min(84vw, 680px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 10px 14px;
      box-shadow: 0 8px 24px rgba(16, 19, 21, .05);
    }

    .assistant .bubble {
      width: 100%;
      padding: 2px 4px;
      background: transparent;
    }

    .system {
      justify-content: center;
      margin: 10px 0;
    }

    .system .bubble {
      max-width: 96%;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 12px;
      text-align: center;
      font-size: 13px;
      box-shadow: 0 6px 18px rgba(16, 19, 21, .035);
    }

    .content {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .content > :first-child { margin-top: 0; }
    .content > :last-child { margin-bottom: 0; }
    .assistant .content { padding: 0 2px; }
    .content.streaming-plain {
      white-space: pre-wrap;
      word-break: break-word;
    }

    p { margin: 0 0 0.88em; }
    h1, h2, h3 { line-height: 1.25; margin: 1.1em 0 .45em; }
    h1 { font-size: 1.32rem; }
    h2 { font-size: 1.16rem; }
    h3 { font-size: 1.04rem; }
    ul, ol { padding-left: 1.35em; margin: .45em 0 .9em; }
    li { margin: .25em 0; }
    a { color: #0b57d0; text-decoration: none; font-weight: 550; }

    blockquote {
      margin: .7em 0;
      padding: .15em .85em;
      border-left: 3px solid var(--line);
      color: #555;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      display: block;
      overflow-x: auto;
      margin: .8em 0;
      font-size: 14px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 7px 9px;
      text-align: left;
    }

    th { background: var(--soft); }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: .55em 0;
      border: 1px solid var(--line);
    }

    .image-placeholder {
      width: 100%;
      max-width: 420px;
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--soft-2);
      color: var(--text);
      padding: 12px 14px;
      margin: .55em 0;
      text-align: left;
      font: inherit;
    }

    .image-placeholder span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .image-placeholder strong {
      display: block;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 3px;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92em;
      background: var(--soft);
      border-radius: 6px;
      padding: .12em .35em;
    }

    pre {
      position: relative;
      overflow-x: auto;
      background: var(--code);
      color: var(--code-text);
      border-radius: 12px;
      padding: 14px;
      margin: .9em 0;
      line-height: 1.48;
      font-size: 13px;
    }

    pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    .katex-display {
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: .25em 0;
      font-size: .96em;
      -webkit-overflow-scrolling: touch;
    }

    details.reasoning {
      border: 0;
      background: transparent;
      border-radius: 0;
      padding: 0;
      margin: 0 0 10px;
      color: var(--muted);
      box-shadow: none;
    }

    details.reasoning summary {
      cursor: pointer;
      width: fit-content;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    details.reasoning summary::-webkit-details-marker {
      display: none;
    }

    details.reasoning summary::after {
      content: '⌄';
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: transform .3s ease, opacity .3s ease;
    }

    details.reasoning:not(.collapsed) summary::after {
      transform: rotate(180deg);
    }

    .reasoning-body {
      margin-top: 0;
      font-size: 14px;
      color: #555;
      border-left: 2px solid var(--line);
      margin-left: 9px;
      padding-left: 14px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-4px);
      transition: max-height .34s ease, opacity .28s ease, transform .34s ease, margin-top .34s ease;
    }

    details.reasoning:not(.collapsed) .reasoning-body {
      margin-top: 9px;
      max-height: 60vh;
      opacity: 1;
      overflow: auto;
      transform: translateY(0);
    }

    .thinking-meta {
      width: fit-content;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .stream-status {
      width: fit-content;
      margin: 0 0 10px;
      color: var(--muted);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 650;
      transition: opacity .28s ease, transform .28s ease;
    }

    .msg.streaming .content::after {
      content: '';
      display: inline-block;
      width: 7px;
      height: 1.05em;
      margin-left: 2px;
      transform: translateY(2px);
      border-radius: 999px;
      background: var(--muted);
      animation: cursorBlink 1s infinite;
    }

    .code-wrap {
      overflow: hidden;
      border-radius: 12px;
      background: var(--code);
      margin: .9em 0;
    }

    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      color: rgba(247,249,251,.74);
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
    }

    .code-copy {
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: inherit;
      padding: 4px 9px;
      font: inherit;
      font-weight: 650;
    }

    .sources {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 14px;
      margin-top: 12px;
      padding: 10px;
      box-shadow: 0 8px 22px rgba(16, 19, 21, .035);
    }

    .sources-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-bottom: 5px;
    }

    .source-list {
      margin: 0;
      padding-left: 1.25em;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .source-list li { margin: .38em 0; }
    .source-list a { color: #0b57d0; text-decoration: none; overflow-wrap: anywhere; }

    .source-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      min-height: 30px;
    }

    .user .actions { justify-content: flex-end; }
    .assistant .actions { justify-content: flex-start; padding-left: 0; }

    .action {
      width: 30px;
      height: 30px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .action:active { background: var(--surface); border-color: var(--line); color: var(--text); }
    .action svg { width: 17px; height: 17px; stroke: currentColor; }

    .msg.selected .bubble {
      outline: 2px solid #4f7df3;
      outline-offset: 3px;
      border-radius: 18px;
    }

    .history-load {
      justify-content: center;
      margin: 8px 0 14px;
    }

    .history-load button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 13px;
      font: inherit;
      font-size: 13px;
      box-shadow: 0 8px 20px rgba(16, 19, 21, .04);
    }

    .typing {
      display: inline-flex;
      gap: 5px;
      align-items: center;
      padding: 8px 2px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      opacity: .35;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    .scroll-bottom {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 8;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      color: var(--text);
      box-shadow: 0 10px 28px rgba(16,19,21,.14);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      backdrop-filter: blur(10px);
    }

    .scroll-bottom.show {
      display: flex;
      animation: rise .18s ease-out;
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(0); opacity: .32; }
      50% { transform: translateY(-3px); opacity: .9; }
    }

    @keyframes cursorBlink {
      0%, 45% { opacity: .85; }
      46%, 100% { opacity: 0; }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main id="chat">
    <div class="empty" id="empty">问点什么，或者上传图片/文件开始。</div>
  </main>
  <button id="scrollBottom" class="scroll-bottom" type="button" aria-label="滚动到底部">⌄</button>

  <script>
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty');
    const scrollBottomButton = document.getElementById('scrollBottom');
    const messages = [];
    let thinkingNode = null;
    let streamingMessage = null;
    let streamClosed = true;
    let historyLoader = null;
    let nextMessageIndex = 0;
    let renderToken = 0;
    let historyRenderGeneration = 0;
    const selectedMessages = new Set();
    let selectionMode = false;
    const RENDER_BATCH_SIZE = 4;

    marked.setOptions({ gfm: true, breaks: true });

    function beginRender(tokenValue) {
      const requested = Number(tokenValue) || 0;
      if (requested) {
        if (requested < historyRenderGeneration) return 0;
        historyRenderGeneration = requested;
        window.__codexHistoryRenderGeneration = historyRenderGeneration;
      }
      renderToken += 1;
      return renderToken;
    }

    function isRenderActive(token) {
      return token && token === renderToken;
    }

    function resetMessages(startIndex) {
      messages.length = 0;
      nextMessageIndex = Number(startIndex) || 0;
      chat.innerHTML = '';
      chat.appendChild(empty);
      empty.style.display = 'flex';
      thinkingNode = null;
      streamingMessage = null;
      streamClosed = true;
      selectedMessages.clear();
      selectionMode = false;
      historyLoader = null;
    }

    function looksLikeLatexBlock(body) {
      const value = (body || '').trim();
      if (!value) return false;
      return /\\(?:begin|end|frac|sqrt|sum|int|sigma|varepsilon|epsilon|tau|alpha|beta|gamma|delta|theta|lambda|mu|cdot|times|left|right|mathbf|mathrm|mathbb|overline)|[_^{}]/.test(value);
    }

    function normalizeLatex(text) {
      let value = (text || '')
        .replace(/\\\\\[/g, '\\[')
        .replace(/\\\\\]/g, '\\]')
        .replace(/\\\\\(/g, '\\(')
        .replace(/\\\\\)/g, '\\)');
      value = value.replace(/(^|\n)\s*\[\s*\n([\s\S]*?)\n\s*\]\s*(?=\n|$)/g, (match, prefix, body) => {
        return looksLikeLatexBlock(body) ? prefix + '$$\n' + body.trim() + '\n$$' : match;
      });
      value = value.replace(/(^|\n)\s*\[([^\]\n]{3,})\]\s*(?=\n|$)/g, (match, prefix, body) => {
        return looksLikeLatexBlock(body) ? prefix + '$$' + body.trim() + '$$' : match;
      });
      value = value.replace(/(^|\n)(\\begin\{(bmatrix|pmatrix|matrix|vmatrix|Vmatrix|aligned|align\*?|cases|equation\*?)\}[\s\S]*?\\end\{\3\})(?=\n|$)/g, (match, prefix, body) => {
        return prefix + '$$\n' + body.trim() + '\n$$';
      });
      value = value.replace(/(^|\n)((?:[A-Za-z0-9_{}\\^+\-*/=(),.\s]|\\[a-zA-Z]+)+\\\\(?:[\s\S]*?))(?=\n\n|$)/g, (match, prefix, body) => {
        const trimmed = body.trim();
        return /\\\\/.test(trimmed) && looksLikeLatexBlock(trimmed) ? prefix + '$$\n' + trimmed + '\n$$' : match;
      });
      return value;
    }

    function safeMarkdown(text, deferImages) {
      const raw = marked.parse(normalizeLatex(text));
      const clean = DOMPurify.sanitize(raw, {
        ADD_TAGS: ['details', 'summary'],
        ADD_ATTR: ['data-codex-src'],
        ADD_URI_SAFE_ATTR: ['src'],
        ALLOWED_URI_REGEXP: /^(?:(?:(?:f|ht)tps?|data|file):|[^a-z]|[a-z+.\-]+(?:[^a-z+.\-:]|$))/i
      });
      if (!deferImages) return clean;
      const template = document.createElement('template');
      template.innerHTML = clean;
      template.content.querySelectorAll('img[src]').forEach(img => {
        img.setAttribute('data-codex-src', img.getAttribute('src') || '');
        img.removeAttribute('src');
      });
      return template.innerHTML;
    }

    function renderMath(root) {
      try {
        renderMathInElement(root, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\[', right: '\\]', display: true },
            { left: '\\(', right: '\\)', display: false },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false,
          strict: false
        });
      } catch (error) {
        console.log(error);
      }
    }

    function icon(name) {
      const paths = {
        copy: '<path d="M8 8h10v10H8z"/><path d="M6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
        edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
        speak: '<path d="M11 5 6 9H3v6h3l5 4z"/><path d="M16 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/>',
        share: '<path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/>',
        refresh: '<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>',
        check: '<path d="m5 12 5 5L20 7"/>'
      };
      return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + paths[name] + '</svg>';
    }

    function openUrl(url) {
      if (!url) return;
      if (window.AndroidBridge && AndroidBridge.openUrl) {
        AndroidBridge.openUrl(url);
        return;
      }
      window.open(url, '_blank');
    }

    function bindLinks(root) {
      root.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href') || '';
        if (!/^https?:\/\//i.test(href)) return;
        link.onclick = event => {
          event.preventDefault();
          openUrl(href);
        };
      });
    }

    function prepareImages(root, deferImages) {
      root.querySelectorAll('img[src], img[data-codex-src]').forEach(img => {
        const src = img.getAttribute('data-codex-src') || img.getAttribute('src') || '';
        const alt = img.getAttribute('alt') || '图片';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.referrerPolicy = 'no-referrer';
        if (!deferImages) return;

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'image-placeholder';
        button.innerHTML = '<span><strong>' + escapeHtml(alt || '图片') + '</strong>点按加载图片，避免打开历史时卡住</span><span>查看</span>';
        button.onclick = () => {
          const loaded = document.createElement('img');
          loaded.alt = alt;
          loaded.loading = 'lazy';
          loaded.decoding = 'async';
          loaded.referrerPolicy = 'no-referrer';
          loaded.src = src;
          button.replaceWith(loaded);
        };
        img.replaceWith(button);
      });
    }

    function decorateCodeBlocks(root) {
      root.querySelectorAll('pre').forEach(pre => {
        if (pre.parentElement && pre.parentElement.classList.contains('code-wrap')) return;
        const code = pre.querySelector('code');
        const languageClass = code ? Array.from(code.classList).find(name => name.startsWith('language-')) : '';
        const language = languageClass ? languageClass.replace('language-', '') : 'code';
        const wrap = document.createElement('div');
        wrap.className = 'code-wrap';
        const bar = document.createElement('div');
        bar.className = 'code-bar';
        const label = document.createElement('span');
        label.textContent = language;
        const copy = document.createElement('button');
        copy.type = 'button';
        copy.className = 'code-copy';
        copy.textContent = '复制';
        copy.onclick = () => copyText((code || pre).textContent || '');
        bar.appendChild(label);
        bar.appendChild(copy);
        pre.replaceWith(wrap);
        wrap.appendChild(bar);
        wrap.appendChild(pre);
      });
    }

    function hydrateContent(root, deferImages) {
      renderMath(root);
      bindLinks(root);
      prepareImages(root, deferImages);
      decorateCodeBlocks(root);
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function speakText(text) {
      if (window.AndroidBridge && AndroidBridge.speakText) {
        AndroidBridge.speakText(text || '');
      }
    }

    function shareText(text) {
      if (window.AndroidBridge && AndroidBridge.shareText) {
        AndroidBridge.shareText(text || '');
      }
    }

    function normalizeSources(sources) {
      return Array.isArray(sources)
        ? sources.filter(source => source && (source.title || source.snippet || source.url))
        : [];
    }

    function addSources(bubble, sources) {
      const items = normalizeSources(sources);
      if (!items.length) return;

      const box = document.createElement('aside');
      box.className = 'sources';

      const title = document.createElement('div');
      title.className = 'sources-title';
      title.textContent = '联网搜索来源';
      box.appendChild(title);

      const list = document.createElement('ol');
      list.className = 'source-list';
      items.forEach(source => {
        const item = document.createElement('li');
        const label = source.title || source.url || '未命名来源';
        if (source.url) {
          const link = document.createElement('a');
          link.href = source.url;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.textContent = label;
          link.onclick = event => {
            event.preventDefault();
            openUrl(source.url);
          };
          item.appendChild(link);
        } else {
          item.textContent = label;
        }
        const metaText = [source.publishedAt, source.snippet].filter(Boolean).join(' · ');
        if (metaText) {
          const meta = document.createElement('span');
          meta.className = 'source-meta';
          meta.textContent = metaText;
          item.appendChild(meta);
        }
        list.appendChild(item);
      });
      box.appendChild(list);
      bubble.appendChild(box);
    }

    function addAction(actions, title, iconName, handler) {
      const button = document.createElement('button');
      button.className = 'action';
      button.type = 'button';
      button.title = title;
      button.setAttribute('aria-label', title);
      button.innerHTML = icon(iconName);
      button.onclick = event => {
        event.stopPropagation();
        handler(event);
      };
      actions.appendChild(button);
    }

    function messageByIndex(index) {
      return messages.find(item => Number(item.index) === Number(index));
    }

    function selectedText() {
      return Array.from(selectedMessages)
        .sort((a, b) => a - b)
        .map(index => messageByIndex(index))
        .filter(Boolean)
        .map(item => (item.role === 'user' ? '你' : 'Codex') + ':\n' + (item.text || ''))
        .join('\n\n');
    }

    function shareMessageText(index, fallback) {
      const multi = selectedText();
      shareText(multi || fallback || '');
      selectedMessages.clear();
      selectionMode = false;
      chat.querySelectorAll('.msg.selected').forEach(node => node.classList.remove('selected'));
    }

    function toggleMessageSelection(row, index) {
      if (selectedMessages.has(index)) {
        selectedMessages.delete(index);
        row.classList.remove('selected');
      } else {
        selectedMessages.add(index);
        row.classList.add('selected');
      }
      selectionMode = selectedMessages.size > 0;
    }

    function wireMessageSelection(row, index) {
      let timer = null;
      let longPressed = false;
      row.addEventListener('pointerdown', event => {
        if (event.target.closest('.actions, a, button, summary')) return;
        longPressed = false;
        timer = window.setTimeout(() => {
          longPressed = true;
          toggleMessageSelection(row, index);
        }, 420);
      });
      row.addEventListener('pointerup', event => {
        if (timer) window.clearTimeout(timer);
        timer = null;
        if (selectionMode && !longPressed && !event.target.closest('.actions, a, button, summary')) {
          toggleMessageSelection(row, index);
        }
      });
      row.addEventListener('pointercancel', () => {
        if (timer) window.clearTimeout(timer);
        timer = null;
      });
    }

    function formatThinkingDuration(elapsedMs) {
      const ms = Number(elapsedMs) || 0;
      if (!ms) return '';
      const seconds = Math.max(1, Math.round(ms / 1000));
      if (seconds >= 60) {
        return Math.floor(seconds / 60) + '分' + String(seconds % 60).padStart(2, '0') + '秒';
      }
      return seconds + ' 秒';
    }

    function thinkingSummaryText(reasoning, elapsedMs) {
      const duration = formatThinkingDuration(elapsedMs);
      const hasReasoning = Boolean(reasoning && reasoning.trim());
      if (hasReasoning && duration) return '已思考（用时 ' + duration + '）';
      if (hasReasoning) return '思考过程';
      return duration ? '用时 ' + duration : '';
    }

    function normalizeReasoningText(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const lower = text.toLowerCase();
      const metadataOnly = new Set(['auto', 'none', 'low', 'medium', 'high', 'minimal', 'detailed', 'concise', 'summary', 'true', 'false']);
      return metadataOnly.has(lower) ? '' : text;
    }

    function wireReasoning(details, body) {
      if (!details || !body) return;
      details.open = true;
      details.classList.add('collapsed');
      const summary = details.querySelector('summary');
      if (!summary) return;
      summary.onclick = event => {
        event.preventDefault();
        const opening = details.classList.contains('collapsed');
        const maxHeight = Math.min(body.scrollHeight, Math.round(window.innerHeight * 0.6));
        body.style.maxHeight = opening ? '0px' : maxHeight + 'px';
        body.offsetHeight;
        details.classList.toggle('collapsed', !opening);
        requestAnimationFrame(() => {
          body.style.maxHeight = opening ? maxHeight + 'px' : '0px';
        });
      };
      body.addEventListener('transitionend', event => {
        if (event.propertyName !== 'max-height') return;
        body.style.maxHeight = '';
      });
    }

    function renderMessage(role, text, reasoning, sources, messageIndex, deferImages, elapsedMs) {
      const row = document.createElement('section');
      row.className = 'msg ' + role;
      row.dataset.index = String(messageIndex);

      const bubble = document.createElement('article');
      bubble.className = 'bubble';

      const cleanReasoning = normalizeReasoningText(reasoning);
      const thinkingLabel = role === 'assistant' ? thinkingSummaryText(cleanReasoning, elapsedMs) : '';
      if (cleanReasoning) {
        const details = document.createElement('details');
        details.className = 'reasoning';
        const summary = document.createElement('summary');
        summary.textContent = thinkingLabel || '思考过程';
        const body = document.createElement('div');
        body.className = 'reasoning-body';
        body.innerHTML = safeMarkdown(cleanReasoning, deferImages);
        details.appendChild(summary);
        details.appendChild(body);
        wireReasoning(details, body);
        bubble.appendChild(details);
        hydrateContent(body, deferImages);
      } else if (thinkingLabel) {
        const meta = document.createElement('div');
        meta.className = 'thinking-meta';
        meta.textContent = thinkingLabel;
        bubble.appendChild(meta);
      }

      const content = document.createElement('div');
      content.className = 'content';
      content.innerHTML = safeMarkdown(text || '', deferImages);
      bubble.appendChild(content);
      hydrateContent(content, deferImages);

      addSources(bubble, sources);

      if (role !== 'system') {
        const actions = document.createElement('div');
        actions.className = 'actions';
        if (role === 'user') {
          addAction(actions, '修改要求', 'edit', () => {
            if (window.AndroidBridge && AndroidBridge.reviseMessage) AndroidBridge.reviseMessage(messageIndex, text || '');
          });
          addAction(actions, '重新生成', 'refresh', () => {
            if (window.AndroidBridge && AndroidBridge.regenerateFromMessage) AndroidBridge.regenerateFromMessage(messageIndex, text || '');
          });
        }
        addAction(actions, '复制', 'copy', () => copyText(text || ''));
        if (role === 'assistant') {
          addAction(actions, '朗读', 'speak', () => speakText(text || ''));
          addAction(actions, '分享', 'share', () => shareMessageText(messageIndex, text || ''));
        }
        bubble.appendChild(actions);
      }

      row.appendChild(bubble);
      if (role !== 'system') {
        wireMessageSelection(row, messageIndex);
      }
      return row;
    }

    function renderReasoningIntoBubble(bubble, reasoning, elapsedMs, deferImages) {
      const oldReasoning = bubble.querySelector('details.reasoning, .thinking-meta');
      if (oldReasoning) oldReasoning.remove();
      const cleanReasoning = normalizeReasoningText(reasoning);
      const thinkingLabel = thinkingSummaryText(cleanReasoning, elapsedMs);
      const content = bubble.querySelector('.content');
      if (cleanReasoning) {
        const details = document.createElement('details');
        details.className = 'reasoning';
        const summary = document.createElement('summary');
        summary.textContent = thinkingLabel || '思考过程';
        const body = document.createElement('div');
        body.className = 'reasoning-body';
        body.innerHTML = safeMarkdown(cleanReasoning, deferImages);
        details.appendChild(summary);
        details.appendChild(body);
        wireReasoning(details, body);
        bubble.insertBefore(details, content || bubble.firstChild);
        hydrateContent(body, deferImages);
      } else if (thinkingLabel) {
        const meta = document.createElement('div');
        meta.className = 'thinking-meta';
        meta.textContent = thinkingLabel;
        bubble.insertBefore(meta, content || bubble.firstChild);
      }
    }

    function setBubbleStatus(bubble, status) {
      let node = bubble.querySelector('.stream-status');
      const value = String(status || '').trim();
      if (!value) {
        if (node) node.remove();
        return;
      }
      if (!node) {
        node = document.createElement('div');
        node.className = 'stream-status';
        bubble.insertBefore(node, bubble.querySelector('.content') || bubble.firstChild);
      }
      node.textContent = value;
    }

    function updateBubble(bubble, text, reasoning, sources, elapsedMs, deferImages, status) {
      if (!bubble) return;
      setBubbleStatus(bubble, status);
      renderReasoningIntoBubble(bubble, reasoning, elapsedMs, deferImages);
      let content = bubble.querySelector('.content');
      if (!content) {
        content = document.createElement('div');
        content.className = 'content';
        bubble.appendChild(content);
      }
      content.className = 'content';
      content.innerHTML = safeMarkdown(text || '', deferImages);
      hydrateContent(content, deferImages);
      const oldSources = bubble.querySelector('.sources');
      if (oldSources) oldSources.remove();
      addSources(bubble, sources);
    }

    function updateStreamingBubble(bubble, text, status) {
      if (!bubble) return;
      setBubbleStatus(bubble, status);
      let content = bubble.querySelector('.content');
      if (!content) {
        content = document.createElement('div');
        bubble.appendChild(content);
      }
      content.className = 'content streaming-plain';
      const value = text || '';
      if (content.textContent !== value) {
        content.textContent = value;
      }
    }

    function startAssistantStream(status) {
      beginRender();
      streamClosed = false;
      removeHistoryLoader();
      if (thinkingNode) {
        thinkingNode.remove();
        thinkingNode = null;
      }
      empty.style.display = 'none';
      if (streamingMessage && streamingMessage.row && streamingMessage.row.isConnected) {
        setBubbleStatus(streamingMessage.bubble, status || '正在生成回复...');
        return;
      }
      const row = document.createElement('section');
      row.className = 'msg assistant streaming';
      const bubble = document.createElement('article');
      bubble.className = 'bubble';
      const content = document.createElement('div');
      content.className = 'content';
      bubble.appendChild(content);
      row.appendChild(bubble);
      chat.appendChild(row);
      streamingMessage = {
        row,
        bubble,
        index: nextMessageIndex++,
        text: '',
        reasoning: '',
        sources: [],
        elapsedMs: 0
      };
      setBubbleStatus(bubble, status || '正在生成回复...');
      scrollBottomIfNearEnd();
    }

    function updateAssistantStream(text, reasoning, sources, elapsedMs, status) {
      if (!streamingMessage) {
        if (streamClosed) return;
        startAssistantStream(status);
      }
      streamingMessage.text = text || '';
      streamingMessage.reasoning = reasoning || '';
      streamingMessage.sources = normalizeSources(sources || []);
      streamingMessage.elapsedMs = Number(elapsedMs || 0) || 0;
      updateStreamingBubble(streamingMessage.bubble, streamingMessage.text, status || '');
      scrollBottomIfNearEnd();
    }

    function finishAssistantStream(text, reasoning, sources, elapsedMs) {
      streamClosed = true;
      if (!streamingMessage) {
        addMessage('assistant', text || '', reasoning || '', sources || [], elapsedMs || 0);
        return;
      }
      streamingMessage.row.classList.remove('streaming');
      updateBubble(streamingMessage.bubble, text || streamingMessage.text || '', reasoning || streamingMessage.reasoning || '', sources || streamingMessage.sources || [], elapsedMs || streamingMessage.elapsedMs || 0, false, '');
      messages.push({
        role: 'assistant',
        text: text || streamingMessage.text || '',
        reasoning: reasoning || streamingMessage.reasoning || '',
        sources: normalizeSources(sources || streamingMessage.sources || []),
        elapsedMs: elapsedMs || streamingMessage.elapsedMs || 0,
        index: streamingMessage.index
      });
      streamingMessage = null;
      scrollBottomIfNearEnd(true);
    }

    function cancelAssistantStream() {
      streamClosed = true;
      if (streamingMessage && streamingMessage.row) {
        streamingMessage.row.remove();
      }
      streamingMessage = null;
    }

    function addMessage(role, text, reasoning, sources, elapsedMs) {
      beginRender();
      removeHistoryLoader();
      empty.style.display = 'none';
      const messageIndex = nextMessageIndex++;
      const row = renderMessage(role, text, reasoning, sources, messageIndex, false, elapsedMs || 0);
      chat.appendChild(row);
      messages.push({ role, text, reasoning, sources: normalizeSources(sources), elapsedMs: elapsedMs || 0, index: messageIndex });
      scrollBottom();
    }

    function renderMessages(items, startIndex, remainingCount, tokenValue) {
      const token = beginRender(tokenValue);
      if (!token) return;
      resetMessages(startIndex || 0);
      const list = Array.isArray(items) ? items : [];
      if (list.length || remainingCount) {
        empty.style.display = 'none';
      }
      let offset = 0;
      function renderChunk() {
        if (!isRenderActive(token)) return;
        const end = Math.min(offset + RENDER_BATCH_SIZE, list.length);
        for (; offset < end; offset++) {
          const item = list[offset] || {};
          const absoluteIndex = (startIndex || 0) + offset;
          const elapsedMs = Number(item.elapsedMs || item.elapsed || 0) || 0;
          const row = renderMessage(item.role || 'assistant', item.text || '', item.reasoning || '', item.sources || [], absoluteIndex, true, elapsedMs);
          chat.appendChild(row);
          messages.push({
            role: item.role || 'assistant',
            text: item.text || '',
            reasoning: item.reasoning || '',
            sources: normalizeSources(item.sources || []),
            elapsedMs,
            index: absoluteIndex
          });
          nextMessageIndex = Math.max(nextMessageIndex, absoluteIndex + 1);
        }
        if (offset < list.length) {
          requestAnimationFrame(renderChunk);
          return;
        }
        addHistoryLoader(remainingCount || 0);
        scrollBottom();
      }
      requestAnimationFrame(renderChunk);
    }

    function prependMessages(items, startIndex, remainingCount, tokenValue) {
      const requested = Number(tokenValue) || historyRenderGeneration;
      if (requested && requested !== historyRenderGeneration) return;
      const token = renderToken;
      const list = Array.isArray(items) ? items : [];
      if (!list.length) {
        addHistoryLoader(remainingCount || 0);
        return;
      }
      empty.style.display = 'none';
      const oldHeight = document.body.scrollHeight;
      removeHistoryLoader();
      const anchor = Array.from(chat.children).find(node => node !== empty) || null;
      const normalized = [];
      let offset = 0;
      function prependChunk() {
        if (!isRenderActive(token)) return;
        const end = Math.min(offset + RENDER_BATCH_SIZE, list.length);
        for (; offset < end; offset++) {
          const item = list[offset] || {};
          const absoluteIndex = (startIndex || 0) + offset;
          const elapsedMs = Number(item.elapsedMs || item.elapsed || 0) || 0;
          const row = renderMessage(item.role || 'assistant', item.text || '', item.reasoning || '', item.sources || [], absoluteIndex, true, elapsedMs);
          chat.insertBefore(row, anchor);
          normalized.push({
            role: item.role || 'assistant',
            text: item.text || '',
            reasoning: item.reasoning || '',
            sources: normalizeSources(item.sources || []),
            elapsedMs,
            index: absoluteIndex
          });
        }
        if (offset < list.length) {
          requestAnimationFrame(prependChunk);
          return;
        }
        messages.unshift(...normalized);
        addHistoryLoader(remainingCount || 0);
        requestAnimationFrame(() => {
          if (!isRenderActive(token)) return;
          const delta = document.body.scrollHeight - oldHeight;
          window.scrollBy(0, delta);
        });
      }
      requestAnimationFrame(prependChunk);
    }

    function addHistoryLoader(remainingCount) {
      removeHistoryLoader();
      if (!remainingCount) return;
      empty.style.display = 'none';
      historyLoader = document.createElement('section');
      historyLoader.className = 'msg system history-load';
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = '加载更早消息（还有 ' + remainingCount + ' 条）';
      button.onclick = () => {
        if (window.AndroidBridge && AndroidBridge.loadEarlierHistory) AndroidBridge.loadEarlierHistory();
      };
      historyLoader.appendChild(button);
      const anchor = Array.from(chat.children).find(node => node !== empty) || null;
      chat.insertBefore(historyLoader, anchor);
    }

    function removeHistoryLoader() {
      if (historyLoader) historyLoader.remove();
      historyLoader = null;
    }

    function setThinking(active) {
      if (!active) {
        if (thinkingNode) thinkingNode.remove();
        thinkingNode = null;
        return;
      }
      empty.style.display = 'none';
      if (thinkingNode) return;
      const row = document.createElement('section');
      row.className = 'msg assistant';
      const bubble = document.createElement('article');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
      row.appendChild(bubble);
      chat.appendChild(row);
      thinkingNode = row;
      scrollBottom();
    }

    function clearMessages() {
      beginRender();
      resetMessages(arguments.length ? (Number(arguments[0]) || 0) : 0);
    }

    function copyText(text) {
      if (window.AndroidBridge && AndroidBridge.copyText) {
        AndroidBridge.copyText(text);
        return;
      }
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
    }

    function scrollBottom() {
      requestAnimationFrame(() => window.scrollTo(0, document.body.scrollHeight));
    }

    function isNearBottom() {
      return window.innerHeight + window.scrollY >= document.body.scrollHeight - 180;
    }

    function scrollBottomIfNearEnd(force) {
      if (force || isNearBottom()) scrollBottom();
      updateScrollButton();
    }

    function updateScrollButton() {
      if (!scrollBottomButton) return;
      scrollBottomButton.classList.toggle('show', !isNearBottom());
    }

    if (scrollBottomButton) {
      scrollBottomButton.onclick = () => scrollBottom();
      window.addEventListener('scroll', updateScrollButton, { passive: true });
      window.addEventListener('resize', updateScrollButton);
    }

    window.ChatView = {
      addMessage,
      renderMessages,
      prependMessages,
      setThinking,
      clearMessages,
      startAssistantStream,
      updateAssistantStream,
      finishAssistantStream,
      cancelAssistantStream
    };
  </script>
</body>
</html>
