plugins {
    id "com.android.application"
}

android {
    namespace "com.codex.apikeychat"
    compileSdk 35

    defaultConfig {
        applicationId "com.codex.apikeychat"
        minSdk 26
        targetSdk 35
        versionCode 20
        versionName "1.2.15"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
}
